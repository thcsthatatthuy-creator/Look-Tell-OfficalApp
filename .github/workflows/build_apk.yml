name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore Gradle Wrapper
        # Lệnh này yêu cầu hệ thống tự động tạo lại file gradle-wrapper.jar bị thiếu
        run: gradle wrapper
        working-directory: LookandTell

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: LookandTell

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        working-directory: LookandTell

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LookAndTell-App-Debug
          path: LookandTell/app/build/outputs/apk/debug/*.apk

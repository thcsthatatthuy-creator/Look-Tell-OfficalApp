name: Build Android APK

on:
  push:
    branches: [ "main", "master" ] # Chạy khi bạn push code vào nhánh chính
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        # Đường dẫn chính xác đến file gradlew trong repo của bạn
        run: chmod +x LookandTell/gradlew

      - name: Build with Gradle
        # Chạy lệnh build bên trong thư mục LookandTell
        run: ./gradlew assembleDebug
        working-directory: LookandTell

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LookAndTell-App-Debug
          # Đường dẫn đến file APK sau khi build xong
          path: LookandTell/app/build/outputs/apk/debug/*.apk

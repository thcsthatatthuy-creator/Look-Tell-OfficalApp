name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download missing Gradle Wrapper JAR
        # Tải thẳng file jar phiên bản 7 cũ để không bị lỗi jcenter() với Gradle 9
        run: wget -O LookandTell/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.0.2/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: LookandTell

      - name: Build with Gradle
        # Chạy build, lúc này hệ thống sẽ tự dùng bản Gradle 7 của dự án
        run: ./gradlew assembleDebug
        working-directory: LookandTell

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LookAndTell-App-Debug
          path: LookandTell/app/build/outputs/apk/debug/*.apk
